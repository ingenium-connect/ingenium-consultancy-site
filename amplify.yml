version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm@9
    build:
      commands:
        - pnpm install
        - pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    - node_modules/.cache
    - .next/cache
  buildTimeout: 30
